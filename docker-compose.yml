services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: ${DB_NAME:-infrastructure_safety}
    volumes:
      - db_data:/var/lib/postgresql/data
    # Postgres is only needed by the `api` container — they share the compose
    # network and reach each other via the hostname `db`. Do NOT publish the
    # port to the host unless you really need a psql/pgAdmin from outside.
    # If you do, uncomment the block below; bind to loopback only:
    #
    # ports:
    #   - "127.0.0.1:${DB_HOST_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-infrastructure_safety}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      # Two ways to point the API at Postgres — pick ONE in .env:
      #   A) DATABASE_URL=postgresql://user:pass@host:5432/db   (takes priority)
      #   B) DB_HOST/DB_PORT/DB_USER/DB_PASSWORD/DB_NAME        (used when DATABASE_URL is empty)
      # Inside compose the Postgres container is reachable as host "db".
      DATABASE_URL: ${DATABASE_URL:-}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      DB_NAME: ${DB_NAME:-infrastructure_safety}
      DB_SSL: ${DB_SSL:-false}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
      AUTO_SEED: ${AUTO_SEED:-true}
      TRUST_PROXY: ${TRUST_PROXY:-1}
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "3001"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3001/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-80}:80"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  db_data:
