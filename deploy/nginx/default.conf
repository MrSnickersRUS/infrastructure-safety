map $sent_http_content_type $cache_control {
  default                                       "no-cache";
  ~*application/(javascript|json)               "public, max-age=31536000, immutable";
  ~*text/css                                    "public, max-age=31536000, immutable";
  ~*image/                                      "public, max-age=2592000";
  ~*font/                                       "public, max-age=31536000, immutable";
}

server {
  listen 80 default_server;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # ---- Hardening ----
  server_tokens off;
  client_max_body_size 1m;
  client_body_timeout 10s;
  client_header_timeout 10s;
  send_timeout 30s;

  # ---- Security headers (applied to all responses) ----
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(self), microphone=(), camera=()" always;
  # The SPA fetches its own JS/CSS plus tile servers; relax if you add 3rd parties.
  add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https:; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; connect-src 'self' https:; frame-ancestors 'self'" always;

  # ---- Compression ----
  gzip on;
  gzip_comp_level 5;
  gzip_min_length 256;
  gzip_proxied any;
  gzip_vary on;
  gzip_types
    application/atom+xml
    application/javascript
    application/json
    application/rss+xml
    application/vnd.ms-fontobject
    application/wasm
    application/x-font-ttf
    application/x-web-app-manifest+json
    application/xhtml+xml
    application/xml
    font/opentype
    image/svg+xml
    image/x-icon
    text/css
    text/javascript
    text/plain
    text/xml;

  # Docker's embedded DNS — used to resolve the `api` service name on demand
  # so nginx starts even if the api container is briefly unreachable.
  resolver 127.0.0.11 ipv6=off valid=10s;

  # ---- Healthcheck for the web container itself ----
  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  # ---- API reverse proxy ----
  location /api/ {
    # Using a variable makes nginx resolve the upstream lazily (per request)
    # instead of at startup — no more "host not found in upstream" crashes
    # when the api container restarts.
    set $upstream_api http://api:3001;
    proxy_pass $upstream_api$request_uri;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_connect_timeout 5s;
    proxy_send_timeout    30s;
    proxy_read_timeout    30s;

    # Don't cache API responses
    proxy_no_cache 1;
    proxy_cache_bypass 1;
  }

  # ---- Long-cache hashed assets ----
  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    try_files $uri =404;
  }

  # ---- SPA fallback ----
  location / {
    add_header Cache-Control $cache_control always;
    try_files $uri $uri/ /index.html;
  }

  # ---- Hide dotfiles ----
  location ~ /\.(?!well-known) {
    deny all;
    return 404;
  }
}
